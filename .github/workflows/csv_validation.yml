name: CSV FAIRe Validation
on:
  pull_request:
    paths: 
      - 'runs/**/data/*faire.csv'
      - 'projects/**/**/data/*.csv'
      - 'projects/**/data/*experimentRunMetadata*.csv'
      - 'projects/**/data/*sampleMetadata*.csv'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-faire-csv:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: false
        
    - name: Set up Conda with caching
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        activate-environment: faire_mapping
        environment-file: environment.yml
        python-version: 3.11
        auto-activate-base: false
        use-mamba: true
        
    - name: Cache conda environment
      uses: actions/cache@v3
      with:
        path: /usr/share/miniconda/envs/faire_mapping
        key: conda-${{ runner.os }}-${{ hashFiles('environment.yml') }}
        restore-keys: |
          conda-${{ runner.os }}-
          
    - name: Install dependencies
      shell: bash -l {0}
      run: | 
        conda list | grep pandas || {
          echo "Installing dependencies..."
          conda install -c conda-forge -c anaconda -c bioconda pandas pyyaml openpyxl isodate requests beautifulsoup4 shapely geopandas h5netcdf netcdf4 xarray pydantic geopy astral
          pip install google-api-python-client google-auth-oauthlib gspread oauth2client python-frontmatter gsw bioawk
        }
        
    - name: Get changed CSV files
      id: changed-files
      uses: tj-actions/changed-files@v40
      with:
        files: | 
          runs/**/data/*faire.csv
          projects/**/**/data/*.csv
          projects/**/data/*experimentRunMetadata*.csv
          projects/**/data/*sampleMetadata*.csv

    - name: Conditionally download LFS files
      if: steps.changed-files.outputs.any_change == 'true'   
      run: git lfs pull
    
    - name: Validate CSV files
      if: steps.changed-files.outputs.any_change == 'true'
      id: validation
      shell: bash -l {0}
      run: |
        echo "changed_files=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT
        
        # Initialize summary file
        summary_file=$(mktemp)
        has_errors=false
        
        # Ensure Python can find the 'models' folder
        export PYTHONPATH=$PYTHONPATH:.

        # Function to determine model class
        get_model_class() {
          case "$1" in
            *runs/**/data/*faire.csv|projects/**/data/*experimentRunMetadata*.csv) echo "ExperimentRunMetadata" ;;
            *projects/**/data/*sampleMetadata*.csv|projects/**/**/data/*.csv) echo "SampleMetadata" ;;
            *) echo "SampleMetadata" ;;
          esac
        }
        
        # Validate each file
        for csv_file in ${{ steps.changed-files.outputs.all_changed_files }}; do
          model_class=$(get_model_class "$csv_file")
          echo "Validating $csv_file with $model_class..."
          
          # Run validation (non-strict mode to continue on errors)
          # We run the script; it produces 'validation_results.log'
          python validators/csv_validator.py "$csv_file" "$model_class"
          exit_code=$?
          
          # Determine status based on the exit code of our script
          if [ $exit_code -ne 0 ]; then
            has_errors=true
            status="❌ FAILED"
          else
            # If it passed but the log contains "WARNING", label it as warnings
            if grep -q "WARNING" validation_results.log 2>/dev/null; then
              status="⚠️ PASSED (with warnings)"
            else
              status="✅ PASSED"
            fi
          fi
          
          # Add to summary file - we read from the LOG file now for better details
          echo "**$csv_file** ($model_class): $status" >> "$summary_file"
          echo '```' >> "$summary_file"
          if [ -f "validation_results.log" ]; then
            cat validation_results.log >> "$summary_file"
          else
            echo "No log generated." >> "$summary_file"
          fi
          echo '```' >> "$summary_file"
          echo "" >> "$summary_file"
          
          # Clean up log for the next file iteration
          rm -f validation_results.log
        done
        
        # Save summary for PR comment using proper multiline output
        {
          echo "SUMMARY<<EOF"
          cat "$summary_file"
          echo "EOF"
        } >> $GITHUB_OUTPUT
        
        rm "$summary_file"
        
        # Exit with error if validation failed
        if [ "$has_errors" = true ]; then
          echo "❌ CSV validation failed"
          exit 1
        else
          echo "✅ All CSV files are valid"
        fi
        
    - name: Comment on PR
      if: always() && github.event_name == 'pull_request' && steps.changed-files.outputs.any_change == 'true'
      uses: actions/github-script@v7
      env:
        VALIDATION_SUMMARY: ${{ steps.validation.outputs.SUMMARY }}
      with:
        script: |
          const summary = process.env.VALIDATION_SUMMARY || 'No logs captured.';
          const outcome = '${{ steps.validation.outcome }}';
          const success = outcome === 'success';
          
          const emoji = success ? '✅' : '❌';
          const title = success ? 
            'All CSV files passed validation!' : 
            'CSV validation failed - please fix errors before merging';
          
          const body = `${emoji} **CSV Data Validation Results**
          
          **${title}**
          
          <details>
          <summary>📋 Detailed Results (Click to expand)</summary>
          
          ${summary}
          
          </details>`;
          
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });